      - btnReceiptSubmit:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(51, 55, 80, 1)
            BorderThickness: =1
            Color: =Color.White
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisplayMode: =
            Fill: =RGBA(52, 199, 89, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =34
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: '=RGBA(40, 175, 70, 1) '
            OnSelect: "=Set(varCIValidate, true);\nIf(\n    IsBlank(drpCIJobNumber.Selected) ||\n    IsBlank(drpCIDriver.Selected) ||\n    CountRows(comboCICrewMembers.SelectedItems) = 0 ||\n    IsBlank(drpCIHour.Selected) ||\n    IsBlank(drpCIMin.Selected) ||\n    IsBlank(drpCIAMPM.Selected) ||\n    IsBlank(varCIPhoto),\n\n    Notify(\n        If(varLang = \"EN\", \"Please fill in all required fields\", \"Por favor complete todos los campos requeridos\"),\n        NotificationType.Error\n    ),\n\n    // Show spinner\n    Set(varShowSubmitting, true);\n\n    // All valid — patch to Daily Assignments\n    IfError(\n    Patch(\n        'Daily Assignments',\n        LookUp('Daily Assignments', ID = varCIAssignmentID),\n        {\n            CheckedIn: true,\n            Driver: {\n                Id: drpCIDriver.Selected.ID,\n                Value: drpCIDriver.Selected.FullName\n            },\n            CheckInDateTime: DateTimeValue(\n                Text(Today(), \"mm/dd/yyyy\") & \" \" &\n                drpCIHour.Selected.Value & \":\" &\n                drpCIMin.Selected.Value & \" \" &\n                drpCIAMPM.Selected.Value\n            )\n        }\n    ),\n    Notify(If(varLang = \"EN\", \"Check-in failed: \" & FirstError.Message, \"Error al registrar: \" & FirstError.Message), NotificationType.Error)\n    );\n\n    // Hide spinner, show success\n    Set(varShowSubmitting, false);\n    Set(varShowSuccess, true);\n\n    // Run Power Automate flow for email + photo attachment\n    \n    CheckIn_EmailNotification.Run(\n        drpCIJobNumber.Selected.ID,\n        \"checkin_photo.jpg\",\n        {\n            name: \"checkin_photo.jpg\",\n            contentBytes: varCIPhoto\n        },\n        drpCIJobNumber.Selected.JobNumber,\n        drpCIDriver.Selected.FullName,\n        /*Concat(comboCICrewMembers.SelectedItems, crewMemberID.FullName, \", \"),*/\n        drpCIHour.Selected.Value & \":\" & drpCIMin.Selected.Value & \" \" & drpCIAMPM.Selected.Value,\n        drpCIJobNumber.Selected.crewNumber\n    );\n\n    // Store submission details for success screen\n    Set(varCISubmittedJob, drpCIJobNumber.Selected.JobNumber);\n    Set(varCISubmittedDriver, drpCIDriver.Selected.FullName);\n    Set(varCISubmittedTime, drpCIHour.Selected.Value & \":\" & drpCIMin.Selected.Value & \" \" & drpCIAMPM.Selected.Value);\n    Set(varCISubmittedCrew, Concat(comboCICrewMembers.SelectedItems, crewMemberID.Value, \", \"));\n    Set(varCIValidate, false)\n\n\n)"
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
