      - galJDPhotos:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Group: jobPhotos
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =Color.Transparent
            Height: =151
            Items: |
              =Filter(varSelectedJob.Attachments, !StartsWith(DisplayName, "signature") && !StartsWith(DisplayName, "PMSignature"))
