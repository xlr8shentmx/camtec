Screens:
  JobDetailScreen:
    Properties:
      Fill: =RGBA(244, 245, 247, 1)
    Children:
      - rectDetailHeader:
          Control: Rectangle@2.3.0
          Properties:
            BorderThickness: =0
            Fill: =RGBA(26, 29, 39, 1)
            Height: =70
            Width: =Parent.Width
      - btnBackDetail:
          Control: Button@2.2.0
          Properties:
            Align: =Align.Left
            BorderThickness: =0
            Color: =RGBA(52, 120, 246, 1)
            Fill: =RGBA(0, 0, 0, 0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Semibold
            Height: =40
            HoverColor: =RGBA(40, 100, 220, 1)
            HoverFill: =RGBA(240, 242, 245, 1)
            OnSelect: =Back(ScreenTransition.None)
            PressedColor: =RGBA(52, 120, 246, 1)
            PressedFill: =RGBA(230, 232, 236, 1)
            Size: =13
            Text: =If(varLang = "EN", "← Back", "← Volver")
            Width: =100
            X: =20
            Y: =15
      - lblDetailTitle:
          Control: Label@2.5.1
          Properties:
            Color: =Color.White
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =40
            Size: =20
            Text: =varSelectedJob.Title
            VerticalAlign: =VerticalAlign.Middle
            Width: =500
            X: =130
            Y: =15
      - rectDetailCard:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(220, 222, 228, 1)
            BorderThickness: =1
            Fill: =Color.White
            Height: =Parent.Height - 110
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Width: =Parent.Width - 80
            X: =40
            Y: =90
