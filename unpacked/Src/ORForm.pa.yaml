      - btnOFSubmit:
          Control: Classic/Button@2.2.0
          Group: ORHeader
          Properties:
            BorderColor: =RGBA(51, 55, 80, 1)
            BorderThickness: =1
            Color: =Color.White
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =RGBA(52, 120, 246, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =34
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(209, 79, 30, 1)
            OnSelect: |-
              =// Validation
              Set(varORValidate, true);
              If(
                  IsBlank(txtORName.Value) ||
                  IsBlank(txtORBadge.Value) ||
                  IsBlank(txtORLocation.Value) ||
                  IsBlank(drpORTimeInHour.Selected),

                  Notify(
                      If(varLang = "EN",
                         "Please fill in all required fields",
                         "Por favor complete todos los campos requeridos"),
                      NotificationType.Error
                  ),

                  // Show spinner
                  Set(varShowSubmitting, true);

                  // Patch OR Report
                  Patch('OF Form', Defaults('OF Form'),
                      {
                          OfficerName: txtORName.Value,
                          BadgeNumber: txtORBadge.Value,
                          Address: txtORLocation.Value,
                          ArrivalTime: dpORStartDate.SelectedDate +
                              TimeValue(drpORTimeInHour.Selected.Value & ":" & drpORTimeInMin.Selected.Value & " " & drpORTimeInAMPM.Selected.Value),
                          DismissalTime: dpOREndDate.SelectedDate +
                              TimeValue(drpORTimeOutHour.Selected.Value & ":" & drpORTimeOutMin.Selected.Value & " " & drpORTimeOutAMPM.Selected.Value),
                          OfficerSignature: penORSignature.Image,
                          Comments: txtORComments.Value,
                          JobID: If(!IsBlank(varPassJobID),
                              {
                                  Id: varPassJobID,
                                  Value: varPassJobName
                              }
                          ),
                          Status: {Value: "Submitted"}
                      }
                  );

                  // Hide spinner, show success
                  Set(varShowSubmitting, false);
                  Set(varShowSuccess, true);
                  Set(varORValidate, false);

                  // Clear pass-through variables
                  Set(varPassJobID, Blank());
                  Set(varPassJobName, Blank());
                  Set(varPassDate, Blank());
                  Set(varPassEndDate, Blank());
                  Set(varPassLocation, Blank());
                  Set(varPassCustomer, Blank());
                  Set(varPassCrewItems, Blank())
              )
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Size: =12
            Text: ="Submit ✓"
            Width: =105
            X: =Parent.Width - 130
            Y: =13
