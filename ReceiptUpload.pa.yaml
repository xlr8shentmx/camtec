      - btnReceiptSubmit_1:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(51, 55, 80, 1)
            BorderThickness: =1
            Color: =Color.White
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisplayMode: =
            Fill: =RGBA(52, 199, 89, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =34
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: '=RGBA(40, 175, 70, 1) '
            OnSelect: |-
              =// Run validation first
              Set(varReceiptVal_Crew, IsBlank(drpReceiptCrew.Selected.ID));
              Set(varReceiptVal_Amount, IsBlank(txtReceiptAmount.Value) || Value(txtReceiptAmount.Value) = 0);
              Set(varReceiptVal_Date, IsBlank(dpReceiptDate));
              Set(varReceiptVal_Category, IsBlank(varReceiptCategory));
              Set(varReceiptVal_Photo, IsBlank(varRecieptPhoto));

              // Only patch if all fields are valid
              If(
                  !varReceiptVal_Crew &&
                  !varReceiptVal_Amount &&
                  !varReceiptVal_Date &&
                  !varReceiptVal_Category &&
                  !varReceiptVal_Photo,

                  IfError(
                      // Success path — patch then reset
                      // Show spinner
                      Set(varShowSubmitting, true);
                      Set(varNewReceiptRecord, 
                      Patch('TC Receipts', Defaults('TC Receipts'),
                          {
                              Title: "RECEIPT - " & 
                  drpReceiptCrew.Selected.FullName & " - " & 
                  Text(dpReceiptDate.SelectedDate, "mm/dd/yyyy") & " - " & 
                  varReceiptCategory,
                              CrewMember: {
                                  Id: drpReceiptCrew.Selected.ID,
                                  Value: drpReceiptCrew.Selected.FullName
                              },
                              Amount: Value(txtReceiptAmount.Value),
                              Date: dpReceiptDate.SelectedDate,
                              Category: {Value: varReceiptCategory},
                              Status: {Value: "Pending"}
                          }
                      )
                      );

                      // Upload photo using the new record's ID
                      ReceiptUpload.Run(
                          varNewReceiptRecord.ID,
                          "receipt_" & Text(Now(), "mmddyyyy_hhmmss") & ".jpg",
                          {
                              name: "receipt_" & Text(Now(), "mmddyyyy_hhmmss") & ".jpg",
                              contentBytes: addPicCICamera_1.Media
                          }
                      );

                      // Hide spinner, show success
                      Set(varShowSubmitting, false);
                      Set(varShowSuccess, true);

                      Set(varReceiptCategory, Blank());
                      Reset(drpReceiptCrew);
                      Reset(txtReceiptAmount);
                      Reset(dpReceiptDate);

                      Set(varReceiptVal_Crew, false);
                      Set(varReceiptVal_Amount, false);
                      Set(varReceiptVal_Date, false);
                      Set(varReceiptVal_Category, false);
                      Set(varReceiptVal_Photo, false);

                      Notify(
                          If(varLang = "EN", "Receipt submitted successfully.", "Recibo enviado exitosamente."),
                          NotificationType.Success
                      ),

                      // Error handler
                      Notify("Submit failed: " & FirstError.Message, NotificationType.Error)
                  ),

                  // Validation failed
                  Notify(
                      If(varLang = "EN", "Please complete all required fields.", "Por favor complete todos los campos requeridos."),
                      NotificationType.Error
                  )
              )
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
