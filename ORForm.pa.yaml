Screens:
  ORForm:
    Properties:
      Fill: =RGBA(244, 245, 247, 1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =If(
            !IsBlank(varPassJobID),
            Set(varORSelectedJob, LookUp('Daily Assignments', ID = varPassJobID));
            ClearCollect(
            colORCrewList,
            Filter(
                'TC Job Crew Assignments',
                JobID.Id = varORSelectedJob.ID
            )

        ),
            Set(varORSelectedJob, Blank());
            // Reset crew collection
            Clear(colORCrewList);
        );



        // Reset all dropdowns
        Reset(drpORJobID);

        // Reset arrival time dropdowns
        Reset(drpORTimeInHour);
        Reset(drpORTimeInMin);
        Reset(drpORTimeInAMPM);

        // Reset dismissal time dropdowns
        Reset(drpORTimeOutHour);
        Reset(drpORTimeOutMin);
        Reset(drpORTimeOutAMPM);


        // Reset text inputs
        Reset(txtORName);
        Reset(txtORBadge);
        Reset(txtORComments);

        // Reset signature pad
        Reset(penORSignature);

        // Reset validation variables
        Set(varORVal_JobID, false);
        Set(varORVal_StartDate, false);
        Set(varORVal_EndDate, false);
        Set(varORVal_ArrivalTime, false);
        Set(varORVal_DismissalTime, false);
        Set(varORVal_OfficerName, false);
        Set(varORVal_BadgeNumber, false);
        Set(varORVal_Signature, false);

        // Reset submission state
        Set(varORSubmitting, false);
        // Reset linked TC Form variable
        // If navigating from TC Form this gets set before Navigate() is called
        // so only reset it here if you want standalone as the default
        // Set(varORLinkedTCForm, Blank())

        Set(varShowSubmitting, false);
        Set(varShowSuccess, false);
