      - btnOFSubmit:
          Control: Classic/Button@2.2.0
          Group: ORHeader
          Properties:
            BorderColor: =RGBA(51, 55, 80, 1)
            BorderThickness: =1
            Color: =Color.White
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =RGBA(52, 120, 246, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =34
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(209, 79, 30, 1)
            OnSelect: "=// Validation\nSet(varORValidate, true);\nIf(\n    IsBlank(drpORJobID.Selected) ||\n    IsBlank(drpORTimeInHour.Selected) ||\n    IsBlank(drpORTimeInMin.Selected) ||\n    IsBlank(drpORTimeInAMPM.Selected) ||\n    IsBlank(drpORTimeOutHour.Selected) ||\n    IsBlank(drpORTimeOutMin.Selected) ||\n    IsBlank(drpORTimeOutAMPM.Selected) ||\n    IsBlank(txtORName.Value) ||\n    IsBlank(txtORBadge.Value),\n\n    Notify(\n        If(varLang = \"EN\",\n           \"Please fill in all required fields\",\n           \"Por favor complete todos los campos requeridos\"),\n        NotificationType.Error\n    ),\n\n    // Show spinner\n    Set(varShowSubmitting, true);\n\n    // Patch OR Report\n    IfError(\n    Set(varNewORReport,\n        Patch('OF Form', Defaults('OF Form'),\n            {\n                Title: varORSelectedJob.JobNumber & \" — \" & drpORJobID.Selected.ID,\n                JobID: {\n                    Id: drpORJobID.Selected.ID,\n                    Value: Text(drpORJobID.Selected.ID)\n                },\n                CustomerID: {\n                Id: varORSelectedJob.customerID.Id,\n                Value: varORSelectedJob.'customerID:CustomerName'.Value\n                },\n                ArrivalTime: DateAdd(\n                    varORSelectedJob.JobDateTime,\n                    Hour(TimeValue(drpORTimeInHour.Selected.Value & \":\" & drpORTimeInMin.Selected.Value & \" \" & drpORTimeInAMPM.Selected.Value)) * 60 +\n                    Minute(TimeValue(drpORTimeInHour.Selected.Value & \":\" & drpORTimeInMin.Selected.Value & \" \" & drpORTimeInAMPM.Selected.Value)),\n                    TimeUnit.Minutes\n                ),\n                DismissalTime: DateAdd(\n                    varORSelectedJob.JobDateTime,\n                    Hour(TimeValue(drpORTimeOutHour.Selected.Value & \":\" & drpORTimeOutMin.Selected.Value & \" \" & drpORTimeOutAMPM.Selected.Value)) * 60 +\n                    Minute(TimeValue(drpORTimeOutHour.Selected.Value & \":\" & drpORTimeOutMin.Selected.Value & \" \" & drpORTimeOutAMPM.Selected.Value)),\n                    TimeUnit.Minutes\n                ),\n                OfficerName: txtORName.Value,\n                BadgeNumber: txtORBadge.Value,\n                Comments: txtORComments.Value,\n                Status: {Value: \"Submitted\"}\n            }\n        )\n    ),\n    Notify(\"Patch failed: \" & FirstError.Message, NotificationType.Error)\n);\n\n'OFForm-EmailNotification'.Run(\n    drpORJobID.Selected.ID,\n    drpORJobID.Selected.JobNumber,\n    txtORName.Value,\n    txtORBadge.Value,\n    drpORTimeInHour.Selected.Value & \":\" & drpORTimeInMin.Selected.Value & \" \" & drpORTimeInAMPM.Selected.Value,\n    drpORTimeOutHour.Selected.Value & \":\" & drpORTimeOutMin.Selected.Value & \" \" & drpORTimeOutAMPM.Selected.Value,\n    txtORComments.Value\n);\n\n    // Hide spinner, show success\n    Set(varShowSubmitting, false);\n    Set(varShowSuccess, true);\n    Set(varORValidate, false);\n\n    // Clear pass-through variables\n    Set(varPassJobID, Blank());\n  \n)"
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Size: =12
            Text: ="Submit ✓"
            Width: =105
            X: =Parent.Width - 130
            Y: =13
