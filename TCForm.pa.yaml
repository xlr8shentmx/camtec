      - btnSubmitForm:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(51, 55, 80, 1)
            BorderThickness: =1
            Color: =Color.White
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =RGBA(232, 93, 38, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =34
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(209, 79, 30, 1)
            OnSelect: "=Set(varTCValidate, true);\nIf(\n    IsBlank(drpTCJobID.Selected) ||\n    IsBlank(dpTCEndDate.SelectedDate) ||\n    IsBlank(drpTCTimeOutHour.Selected) ||\n    IsBlank(drpTCTimeOutMin.Selected) ||\n    IsBlank(drpTCTimeOutAMPM.Selected) ||\n    CountRows(comboCTCrew.SelectedItems) = 0 ||\n    IsBlank(txtPMName.Value) ||\n    IsBlank(dpTCPMSignatureDate.SelectedDate) ||\n    IsBlank(penPMSignature.Image),\n    \n    // Show error\n    Notify(\"Please fill in all required fields\", NotificationType.Error),\n    \n    // Proceed with submission\n    Set(varShowSubmitting, true);\n\n    // Proceed to Patch SharePoint \n    // Create the TC Job record\n    IfError(\n    Set(varNewJob,\n    Patch('TC Form', Defaults('TC Form'),\n        {\n            JobName: drpTCJobID.Selected.JobNumber & \" - \" & drpTCJobID.Selected.ID,\n            JobID: {\n                Id: drpTCJobID.Selected.ID,\n                Value: drpTCJobID.Selected.JobNumber\n            },\n            CustomerID: {\n                Id: varTCSelectedJob.customerID.Id,\n                Value: varTCSelectedJob.'customerID:CustomerName'.Value\n            },\n            EndDateTime: DateAdd(\n                dpTCEndDate.SelectedDate,\n                Hour(TimeValue(drpTCTimeOutHour.Selected.Value & \":\" & drpTCTimeOutMin.Selected.Value & \" \" & drpTCTimeOutAMPM.Selected.Value)) * 60 +\n                Minute(TimeValue(drpTCTimeOutHour.Selected.Value & \":\" & drpTCTimeOutMin.Selected.Value & \" \" & drpTCTimeOutAMPM.Selected.Value)),\n                TimeUnit.Minutes\n            ),\n            SVC_TrafficCrew: togTrafficCrew.Checked,\n            SVC_EmergencyCrew: togEmergencyCrew.Checked,\n            SVC_AddonFlagger: togAddOnFlagger.Checked,\n            SVC_Mobilization: togMobilization.Checked,\n            SVC_Arrowboard: togArrowBoard.Checked,\n            SVC_POwVehicle: togPO.Checked,\n            ProjectManagerName: txtPMName.Value,\n            PMSignatureDate: dpTCPMSignatureDate.SelectedDate,\n            PMSignature: penPMSignature.Image,\n            Status: {Value: \"Submitted\"},\n            cancelledCrew: togCancelledCrew.Checked\n        }\n    )\n),\nNotify(\"Patch Failed: \" & FirstError.Message, NotificationType.Error)\n    );\n\n    // Step 2: Write crew assignments to junction table\n    ForAll(\n        comboCTCrew.SelectedItems,\n        Patch('TC Job Crew Assignments',\n            Defaults('TC Job Crew Assignments'),\n            {\n                Title: drpTCJobID.Selected.JobNumber & \" — \" & ThisRecord.FullName,\n                JobID: {\n                Id: drpTCJobID.Selected.ID,\n                Value: drpTCJobID.Selected.JobNumber\n                },\n                CrewMemberID: {\n                    Id: ThisRecord.ID,\n                    Value: ThisRecord.LastName\n                }\n            }\n        )\n    );\n\n    // Upload the attached photos to the \n    ForAll(\n    colTCPhotos,\n    UploadPhotos.Run(\n        varNewJob.ID,\n        ThisRecord.Name,\n        {\n            contentBytes: ThisRecord.Photo,\n            name: ThisRecord.Name\n        }\n    )\n);\n\n    // Step 6: Clean up\n    Clear(colTCPhotos);\n\n    Set(varShowSubmitting, false);\n    Set(varShowSuccess, true);\n    Set(varTCValidate, false)\n)\n\n\n"
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Size: =12
            Text: ="Submit ✓"
            Width: =105
            X: =Parent.Width - 130
