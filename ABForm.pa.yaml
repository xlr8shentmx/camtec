Screens:
  ABForm:
    Properties:
      Fill: =RGBA(244, 245, 247, 1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =// Pre-load job if arriving from TC Form
        If(
            !IsBlank(varPassJobID),
            Set(varABSelectedJob, LookUp('Daily Assignments', ID = varPassJobID));
            ClearCollect(
                colABCrewList,
                Filter('TC Job Crew Assignments', JobID.Id = varPassJobID)
            ),
            Set(varABSelectedJob, Blank());
            Clear(colABCrewList)
        );

        // Reset dropdowns
        Reset(drpABJobID);
        Reset(cmboABDriver);

        // Reset text inputs
        Reset(txtABNumber);
        Reset(txtABNotes);

        // Reset pickup time dropdowns
        Reset(drpABPickupHour);
        Reset(drpABPickupMin);
        Reset(drpABPickupAMPM);

        // Reset dropoff time dropdowns
        Reset(drpABDropoffHour);
        Reset(drpABDropoffMin);
        Reset(drpABDropoffAMPM);

        // Reset checklist checkboxes — Pickup
        Reset(chkPU_Tires);
        Reset(chkPU_Pins);
        Reset(chkPU_StabLegs);
        Reset(chkPU_TurnSignals);
        Reset(chkPU_ArrowScreen);
        Reset(chkPU_Pulley);
        Reset(chkPU_ControlBox);
        Reset(chkPU_Chains);
        Reset(chkPU_ElecCable);
        Reset(chkPU_SupportLeg);

        // Reset checklist checkboxes — Dropoff
        Reset(chkDO_Tires);
        Reset(chkDO_Pins);
        Reset(chkDO_StabLegs);
        Reset(chkDO_TurnSignals);
        Reset(chkDO_ArrowScreen);
        Reset(chkDO_Pulley);
        Reset(chkDO_ControlBox);
        Reset(chkDO_Chains);
        Reset(chkDO_ElecCable);
        Reset(chkDO_SupportLeg);

        // Reset validation variables
        Set(varABVal_JobID, false);
        Set(varABVal_BoardNumber, false);
        Set(varABVal_CrewDriver, false);
        Set(varABVal_PickupTime, false);

        // Reset submission and success state
        Set(varABSubmitting, false);
        Set(varShowSuccess, false)
