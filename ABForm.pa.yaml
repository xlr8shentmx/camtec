      - btnOFDraftSave_1:
          Control: Classic/Button@2.2.0
          Group: ABHeader
          Properties:
            BorderColor: =RGBA(51, 55, 80, 1)
            BorderThickness: =1
            Color: =RGBA(157, 162, 181, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =Color.Transparent
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =34
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(36, 40, 56, 1)
            OnSelect: |-
              =Set(varABValidate, true);

              If(
                  IsBlank(drpABJobID.Selected) ||
                  IsBlank(txtABNumber.Value) ||
                  IsBlank(cmboABDriver.Selected) ||
                  IsBlank(drpABPickupHour.Selected) ||
                  IsBlank(drpABPickupMin.Selected) ||
                  IsBlank(drpABPickupAMPM.Selected) ||
                  IsBlank(drpABDropoffHour.Selected) ||
                  IsBlank(drpABDropoffMin.Selected) ||
                  IsBlank(drpABDropoffAMPM.Selected),

                  Notify(
                      If(varLang = "EN",
                         "Please fill in all required fields",
                         "Por favor complete todos los campos requeridos"),
                      NotificationType.Error
                  ),

                  // Show spinner
                  Set(varShowSubmitting, true);

                  // Patch Arrow Board Inspection
                  IfError(
                  Patch('Arrowboard', Defaults('Arrowboard'),
                      {
                          Title: "AB-" & Text(drpABJobID.Selected.ID) & "-" & txtABNumber.Value,
                          ArrowBoardNumber: txtABNumber.Value,
                          JobID: {
                                  Id: drpABJobID.Selected.ID,
                                  Value: Text(drpABJobID.Selected.ID)
                              }
                          ,
                          CrewDriver: {
                              Id: cmboABDriver.Selected.ID,
                              Value: cmboABDriver.Selected.LastName
                          },
                          PickupTime: varABSelectedJob.JobDateTime +
                              TimeValue(drpABPickupHour.Selected.Value & ":" & drpABPickupMin.Selected.Value & " " & drpABPickupAMPM.Selected.Value),
                          DropOffTime: varABSelectedJob.JobDateTime +
                              TimeValue(drpABDropoffHour.Selected.Value & ":" & drpABDropoffMin.Selected.Value & " " & drpABDropoffAMPM.Selected.Value),

                          // Pick Up checkboxes
                          Tires_Pickup: chkPU_Tires.Checked,
                          Pins_Pickup: chkPU_Pins.Checked,
                          StabilizingLegs_Pickup: chkPU_StabLegs.Checked,
                          TurnSignals_Pickup: chkPU_TurnSignals.Checked,
                          ArrowScreen_Pickup: chkPU_ArrowScreen.Checked,
                          PulleySystem_Pickup: chkPU_Pulley.Checked,
                          ControlBox_Pickup: chkPU_ControlBox.Checked,
                          Chains_Pickup: chkPU_Chains.Checked,
                          ElectricCable_Pickup: chkPU_ElecCable.Checked,
                          SupportLeg_Pickup: chkPU_SupportLeg.Checked,

                          // Drop Off checkboxes
                          Tires_Dropoff: chkDO_Tires.Checked,
                          Pins_Dropoff: chkDO_Pins.Checked,
                          Stabilizing_Dropoff: chkDO_StabLegs.Checked,
                          TurnSignals_Dropoff: chkDO_TurnSignals.Checked,
                          ArrowScreen_Dropoff: chkDO_ArrowScreen.Checked,
                          PulleySystem_Dropoff: chkDO_Pulley.Checked,
                          ControlBox_Dropoff: chkDO_ControlBox.Checked,
                          Chains_Dropoff: chkDO_Chains.Checked,
                          ElectricCable_Dropoff: chkDO_ElecCable.Checked,
                          SupportLeg_Dropoff: chkDO_SupportLeg.Checked,

                          Notes: txtABNotes.Value,
                          Status: {Value: "Draft"}
                      }
                  ),
                  Notify(If(varLang = "EN", "Submission failed: " & FirstError.Message, "Error al enviar: " & FirstError.Message), NotificationType.Error)
                  );

                  // Hide spinner, show success
                  Set(varShowSubmitting, false);
                  Set(varShowSuccess, true);
                  Set(varABValidate, false);

                  // Clear pass-through variables
                  Set(varPassJobID, Blank());

              )
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Size: =11
            Text: ="Save Draft"
            Width: =105
            X: =Parent.Width - 250
            Y: =13
