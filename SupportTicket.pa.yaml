      - btnSTSubmit:
          Control: Classic/Button@2.2.0
          Group: headerGrp
          Properties:
            BorderColor: =RGBA(51, 55, 80, 1)
            BorderThickness: =1
            Color: =Color.White
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =RGBA(232, 93, 38, 1)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =34
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(209, 79, 30, 1)
            OnSelect: "=Set(varSTValidate, true);\nIf(\n    IsBlank(drpSTCrewMember.Selected) ||\n    IsBlank(varSTCategory) ||\n    IsBlank(varSTPriority) ||\n    IsBlank(txtSTSubject.Value) ||\n    IsBlank(txtSTDescription.Value),\n\n    Notify(\"Please complete all required fields.\", NotificationType.Error),\n\n    Set(varShowSubmitting, true);\n    IfError(\n        Set(varNewSTRecord,\n            Patch('Support Tickets', Defaults('Support Tickets'), {\n                Title: varSTTicketID & \" - \" & txtSTSubject.Value,\n                CrewMemberID: {Id: drpSTCrewMember.Selected.ID, Value: drpSTCrewMember.Selected.Fullname},\n                Category: {Value: varSTCategory},\n                PriorityLevel: {Value: varSTPriority},\n                Description: txtSTDescription.Value,\n                JobId: If(!IsBlank(drpSTRelatedJob.Selected),\n                    {Id: drpSTRelatedJob.Selected.ID, Value: drpSTRelatedJob.Selected.JobNumber}),\n                Status: {Value: \"Open\"}\n            })\n        );\n        Set(varShowSubmitting, false);\n        Set(varShowSuccess, true);\n        Set(varSTValidate, false),\n\n        Set(varShowSubmitting, false);\n        Notify(\"Submit failed: \" & FirstError.Message, NotificationType.Error)\n    )\n)"
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Size: =12
            Text: ="Submit Ticket ✓"
            Width: =130
            X: =Parent.Width - 145
            Y: =13
