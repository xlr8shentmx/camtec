Screens:
  SupportTicket:
    Properties:
      Fill: =RGBA(244, 245, 247, 1)
      OnVisible: |-
        =Set(varSTCategory, Blank());
        Set(varSTPriority, Blank());
        Set(varSTValidate, false);
        Set(varShowSubmitting, false);
        Set(varShowSuccess, false);
        Set(varSTTicketID, "TKT-" & Text(CountRows('Support Tickets') + 2001, "0000"));
        Reset(drpSTCrewMember);
        Reset(txtSTSubject);
        Reset(drpSTRelatedJob);
        Reset(txtSTDescription)
    Children:
      - rectSTHeader:
          Control: Rectangle@2.3.0
          Group: headerGrp
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(27, 30, 43, 1)
            Height: =58
            Width: =Parent.Width
      - btnSTHome:
          Control: Classic/Button@2.2.0
          Group: headerGrp
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 122, 69, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =Color.Transparent
            Font: =Font.'Open Sans'
            Height: =34
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(232, 93, 38, 0.1)
            OnSelect: =Navigate(HomeScreen, ScreenTransition.None)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            RadiusTopLeft: =6
            RadiusTopRight: =6
            Size: =13
            Text: ="< Home"
            Width: =90
            X: =16
            Y: =12
      - lblSTTitle:
          Control: Label@2.5.1
          Group: headerGrp
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =Color.White
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =34
            Size: =17
            Text: ="Support Ticket"
            Width: =200
            X: =130
            Y: =12
      - lblSTSubtitle:
          Control: Label@2.5.1
          Group: headerGrp
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(157, 162, 181, 1)
            Font: =Font.'Open Sans'
            Height: =24
            Size: =12
            Text: ="Submit a request or issue"
            Width: =220
            X: =340
            Y: =19
      - btnSTDiscard:
          Control: Classic/Button@2.2.0
          Group: headerGrp
          Properties:
            BorderColor: =RGBA(51, 55, 80, 1)
            BorderThickness: =1
            Color: =RGBA(157, 162, 181, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
