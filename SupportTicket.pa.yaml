            Height: =26
            HtmlText: ="<span style='font-size:15px; font-weight:600; color:#6b7080;'>Submitting Crew Member<span style='color:#ef4444;'> *</span></span>"
            PaddingBottom: =0
            PaddingTop: =0
            Width: =rectSTCrewCard.Width - 44
            X: =rectSTCrewCard.X + 22
            Y: =lblSTCrewHeader.Y + lblSTCrewHeader.Height + 8
      - drpSTCrewMember:
          Control: ComboBox@0.0.51
          Group: crewMemberGrp
          Properties:
            BasePaletteColor: =RGBA(232, 93, 38, 1)
            BorderColor: =If(varSTValidate && IsBlank(drpSTCrewMember.Selected), RGBA(239, 68, 68, 1), RGBA(220, 223, 229, 1))
            BorderRadius: =8
            FontSize: =15
            Height: =40
            Items: |-
              =AddColumns(
                  Filter('Crew Members', Status.Value = "Active"),
                  Fullname,
                  FirstName & " " & LastName
              )
            Width: =rectSTCrewCard.Width - 44
            X: =rectSTCrewCard.X + 22
            Y: =htmlSTCrewLabel.Y + htmlSTCrewLabel.Height + 6
          Children:
            - Fullname_ST:
                Control: ComboBoxDataField@1.5.0
                Variant: textualColumn
                IsLocked: true
                Properties:
                  FieldDisplayName: ="Fullname"
                  FieldName: ="Fullname"
                  FieldType: ="s"
                  Order: =6
      - htmlSTCrewPill:
          Control: HtmlViewer@2.1.0
          Group: crewMemberGrp
          Properties:
            Font: =Font.'Open Sans'
            Height: =46
            HtmlText: |-
              ="<div style='display:flex; align-items:center; gap:10px; background:#fafbfc; border:1px solid #e2e4e9; border-radius:8px; padding:9px 14px;'><div style='width:30px; height:30px; border-radius:50%; background:#e85d26; color:white; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; flex-shrink:0;'>"
